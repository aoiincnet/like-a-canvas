<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like a Canvas</title>
  <meta name="description" content="OEMグッズ制作。デザインから製造・納品まで一括対応。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111110;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #1f1e1c 0%, #0e0e0d 100%);
      z-index: 0;
    }

    .cs-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cs-logo {
      margin-bottom: 52px;
    }

    .cs-logo img {
      height: 72px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .cs-rule {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 40px;
    }

    .cs-title {
      font-size: clamp(32px, 7vw, 64px);
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
      margin-bottom: 20px;
    }

    .cs-sub {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 48px;
    }

    .cs-tagline {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      line-height: 2;
      margin-bottom: 56px;
    }

    .cs-contact-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      margin-bottom: 10px;
    }

    .cs-contact-link {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      padding-bottom: 3px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .cs-contact-link:hover {
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.5);
    }

    .cs-copyright {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.1);
      z-index: 1;
    }

    .cs-wrap { animation: fadeUp 1.2s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cs-wrap">

    <div class="cs-logo">
      <img src="assets/images/static/logo.png" alt="Like a Canvas">
    </div>

    <div class="cs-rule"></div>

    <h1 class="cs-title">Coming Soon</h1>
    <p class="cs-tagline">
      OEM Goods Production<br>
      Design &nbsp;—&nbsp; Manufacturing &nbsp;—&nbsp; Delivery
    </p>

    <p class="cs-contact-label">Contact</p>
    <a href="mailto:aoyama@aoiinc.net" class="cs-contact-link">aoyama@aoiinc.net</a>

  </div>

  <p class="cs-copyright">© 2025 Like a Canvas / 株式会社Aoi</p>

</body>
</html>
